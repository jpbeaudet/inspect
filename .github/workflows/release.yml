name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write
  id-token: write   # cosign keyless signing via GitHub OIDC

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: inspect

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: install cross (linux)
        if: matrix.cross
        run: cargo install cross --locked

      - name: build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: package
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          ver="${ver#v}"
          stage="$(mktemp -d)"
          name="${BIN_NAME}-${ver}-${{ matrix.target }}"
          mkdir -p "$stage/$name"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$stage/$name/"
          cp README.md LICENSE* "$stage/$name/" 2>/dev/null || true
          tar -C "$stage" -czf "${name}.tar.gz" "$name"
          shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          echo "archive=${name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha256=${name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.sha256 }}
          if-no-files-found: error
          retention-days: 7

  sign-and-release:
    name: sign + publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: sign archives (keyless)
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          for f in *.tar.gz; do
            cosign sign-blob --yes --output-signature "${f}.sig" --output-certificate "${f}.pem" "$f"
          done
          ls -la

      - name: aggregate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          cat *.tar.gz.sha256 | sort > SHA256SUMS
          cat SHA256SUMS

      - name: publish release
        # B5 (v0.1.2): bumped past v2 (Node 20) to v3 ahead of GitHub's
        # 2026-09-16 Node-20 removal. v3 is the first major to declare
        # `runs.using: node24` in action.yml.
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.tar.gz.sig
            dist/*.tar.gz.pem
            dist/SHA256SUMS

  publish-crate:
    name: cargo publish
    needs: sign-and-release
    runs-on: ubuntu-latest
    # Only runs when a CARGO_REGISTRY_TOKEN secret is configured.
    # `vars.PUBLISH_CRATE` (set to "true" in repo settings) is the explicit
    # opt-in; without it the job is a no-op so tag pushes can't accidentally
    # publish to crates.io.
    if: ${{ vars.PUBLISH_CRATE == 'true' }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
